overview: "Restrict each user to only their requested or granted media."
description: >
  Restricts which media each user sees inside their libraries. Media becomes
  visible either when the user requests it through Jellyseerr (auto-granted via
  webhook) or when they add it from a home-screen widget. Built on Jellyfin's
  native per-user allowed-tags whitelist: each user gets a personal tag and only
  sees items carrying it. Every user can turn their own restriction off from the
  widget.
